name: Validar SKUs en Google Sheets

on:
  workflow_dispatch: # Esto crea un botón manual en GitHub para arrancar el proceso

jobs:
  validar_modelos:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install -r requirements.txt

      - name: Ejecutar búsqueda y actualizar Sheets
        run: python scraper.py
